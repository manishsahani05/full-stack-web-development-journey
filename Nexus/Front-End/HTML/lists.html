<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists in HTML</title>
</head>
<body>
   <h1>Lists in HTML</h1> 
   <h2>Unordered Lists</h2>
   <ul>
    <li>Entry 1</li>
    <li>Entry 2</li>
    <li>Entry 3</li>
   </ul>
   <h2>Orderde Lists</h2>
   <ol type="A">
    <li>Entry 1</li>
    <li>Entry 2</li>
    <li>Entry 3</li>
   </ol>
</body>
</html>
