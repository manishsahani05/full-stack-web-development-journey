<!--
Table are used to represent real life table data 

HTML Tables are used to display data in rows and columns

Common table tags:->
<table> : to create a table
<tr> : used to display table row
<td> : used to display table data
<th> : used to display table header

:->Semantic in table:
<thead> : used to wrap table header
<tbody> : used to wrap table body
<tfoot> : used to wrap table footer
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border="black">
        <caption>Food Menu</caption>
        <!--Table Header-->
        <thead>
        <tr>
            <th>Item</th>
            <th>Price</th>
        </tr>
        </thead>
        <!-- Table Body -->
         <tbody>
        <tr>
            <td>Frooti</td>
            <td>10</td>
        </tr>
        <tr>
            <td>Samosa</td>
            <td>12</td>
        </tr>
        <tr>
            <td>Chips</td>
            <td>10</td>
        </tr>
        </tbody>
    </table>
</body>
</html>
